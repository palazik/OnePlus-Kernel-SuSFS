name: Build OnePlus 13 (PJZ110) Kernel

on:
  workflow_dispatch:
    inputs:
      manager:
        description: 'KSU Manager'
        required: true
        default: 'SukiSU-Ultra'
        type: choice
        options:
          - SukiSU-Ultra
          - ReSukiSU
          - KernelSU
          - KernelSU-Next
          - WildKSU
      susfs_branch:
        description: 'SuSFS branch'
        required: true
        default: 'gki-android15-6.6'
        type: string
      kpm:
        description: 'Enable KPM support (SukiSU-Ultra only)'
        required: true
        default: true
        type: boolean
      watermark:
        description: 'uname watermark suffix'
        required: false
        default: '-palaziks'
        type: string
      upload_release:
        description: 'Create GitHub Release'
        required: false
        default: false
        type: boolean

env:
  KERNEL_MANIFEST_REPO: https://github.com/OnePlusOSS/kernel_manifest.git
  KERNEL_MANIFEST_BRANCH: oneplus/sm8750
  KERNEL_MANIFEST_XML: oneplus_13.xml
  BUILD_SCRIPT: kernel_platform/oplus/build/oplus_build_kernel.sh
  BUILD_TARGET: sun perf
  IMAGE_PATH: kernel_platform/out/msm-kernel-sun-perf/dist/Image
  ANYKERNEL3_REPO: https://github.com/osm0sis/AnyKernel3
  ANYKERNEL3_BRANCH: master

jobs:
  build:
    name: Build | ${{ inputs.manager }} | SuSFS=${{ inputs.susfs_branch }}
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      # ── Свободное место ───────────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' \
            '^mysql-.*' azure-cli google-cloud-sdk google-chrome-stable \
            firefox powershell mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      # ── Зависимости ───────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            git repo python3 python3-pip curl wget zip unzip bc \
            bison flex libssl-dev libelf-dev libncurses-dev \
            build-essential ca-certificates cpio rsync \
            ccache lz4 zstd

      # ── Настройка ccache ──────────────────────────────────────────────────
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-op13-${{ inputs.manager }}-${{ github.run_id }}
          restore-keys: |
            ccache-op13-${{ inputs.manager }}-
            ccache-op13-

      - name: Configure ccache
        run: |
          ccache --max-size=5G
          ccache --zero-stats

      # ── Repo sync ─────────────────────────────────────────────────────────
      - name: Initialize repo
        run: |
          mkdir -p /home/runner/kernel && cd /home/runner/kernel
          repo init --depth 1 \
            -u ${{ env.KERNEL_MANIFEST_REPO }} \
            -b ${{ env.KERNEL_MANIFEST_BRANCH }} \
            -m ${{ env.KERNEL_MANIFEST_XML }}

      - name: Sync sources
        working-directory: /home/runner/kernel
        run: |
          repo sync -c -j2 --force-sync --no-clone-bundle --no-tags
          echo "Sync complete"
          df -h

      # ── Определяем версию ядра ────────────────────────────────────────────
      - name: Get kernel version
        id: kver
        working-directory: ~/kernel/kernel_platform/common
        run: |
          VER=$(make kernelversion 2>/dev/null || cat Makefile | \
            awk '/^VERSION|^PATCHLEVEL|^SUBLEVEL/{print $3}' | \
            head -3 | paste -sd '.')
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Kernel version: ${VER}"

      # ── Интегрируем KSU менеджер ──────────────────────────────────────────
      - name: Setup KSU — SukiSU-Ultra
        if: inputs.manager == 'SukiSU-Ultra'
        working-directory: ~/kernel/kernel_platform/common
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" \
            | bash -s susfs-main

      - name: Setup KSU — ReSukiSU
        if: inputs.manager == 'ReSukiSU'
        working-directory: ~/kernel/kernel_platform/common
        run: |
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" \
            | bash -s main

      - name: Setup KSU — KernelSU
        if: inputs.manager == 'KernelSU'
        working-directory: ~/kernel/kernel_platform/common
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" \
            | bash -s main

      - name: Setup KSU — KernelSU-Next
        if: inputs.manager == 'KernelSU-Next'
        working-directory: ~/kernel/kernel_platform/common
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
            | bash -s next

      - name: Setup KSU — WildKSU
        if: inputs.manager == 'WildKSU'
        working-directory: ~/kernel/kernel_platform/common
        run: |
          curl -LSs "https://raw.githubusercontent.com/WildPlusKernel/KernelSU/main/kernel/setup.sh" \
            | bash -s main

      # ── SuSFS ─────────────────────────────────────────────────────────────
      - name: Integrate SuSFS
        working-directory: ~/kernel/kernel_platform/common
        run: |
          SUSFS_BRANCH="${{ inputs.susfs_branch }}"
          git clone --depth 1 \
            -b "${SUSFS_BRANCH}" \
            https://github.com/sidex15/susfs4ksu \
            /tmp/susfs4ksu || \
          git clone --depth 1 \
            -b "${SUSFS_BRANCH}" \
            https://github.com/simonpunk/susfs4ksu \
            /tmp/susfs4ksu

          # Патчим ядро
          KSU_DIR="$(find . -maxdepth 4 -name 'setup.sh' -path '*/kernelsu/*' \
            -exec dirname {} \; 2>/dev/null | head -1 || true)"

          cp /tmp/susfs4ksu/kernel_patches/fs/susfs.c               fs/
          cp /tmp/susfs4ksu/kernel_patches/include/linux/susfs.h    include/linux/
          cp /tmp/susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/ 2>/dev/null || true
          cp /tmp/susfs4ksu/kernel_patches/fs/sus_su.c              fs/ 2>/dev/null || true
          cp /tmp/susfs4ksu/kernel_patches/include/linux/sus_su.h   include/linux/ 2>/dev/null || true

          # Применяем патч на fs/Makefile и fs/Kconfig
          PATCH_DIR=/tmp/susfs4ksu/kernel_patches
          if ls "${PATCH_DIR}"/*.patch &>/dev/null; then
            for p in "${PATCH_DIR}"/*.patch; do
              patch -p1 --forward --reject-file=/dev/null < "$p" || \
                echo "Patch $p already applied or skipped"
            done
          fi

          echo "SuSFS integrated (branch: ${SUSFS_BRANCH})"

      # ── KPM конфиг ───────────────────────────────────────────────────────
      - name: Enable KPM config
        if: inputs.kpm == true && inputs.manager == 'SukiSU-Ultra'
        working-directory: ~/kernel/kernel_platform/common
        run: |
          # Добавляем в oplus-specific defconfig если есть, иначе в gki
          DEFCONFIGS=(
            "arch/arm64/configs/gki_defconfig"
            "arch/arm64/configs/vendor/sun_GKI.config"
          )
          for DEF in "${DEFCONFIGS[@]}"; do
            if [ -f "$DEF" ]; then
              grep -q "CONFIG_KPM" "$DEF" || \
                echo "CONFIG_KPM=y" >> "$DEF"
              grep -q "CONFIG_KALLSYMS_ALL" "$DEF" || \
                echo "CONFIG_KALLSYMS_ALL=y" >> "$DEF"
              echo "KPM added to $DEF"
            fi
          done

      # ── Мульти-менеджер (разрешаем несколько UID менеджеров) ──────────────
      - name: Patch multi-manager support
        working-directory: ~/kernel/kernel_platform/common
        run: |
          # Снимаем ограничение на один менеджер: разрешаем разные пакеты
          # управлять ядром через ksu_allow_uid/setup_manager_uid
          KSUD_SYSCTL="drivers/kernelsu/core_hook.c"
          if [ -f "$KSUD_SYSCTL" ]; then
            # Убираем хардкод пакетного имени если присутствует
            sed -i 's/strcmp(task_comm, "com.rsuntk.ksu")/1 \/\* multi-manager \*\//g' \
              "$KSUD_SYSCTL" 2>/dev/null || true
          fi

          # Патч setup_manager через sysctl для поддержки WildKSU/MKSU/KSU/SukiSU одновременно
          # (фактически реализуется на уровне менеджера, ядро должно просто
          #  принимать любой UID как manager — удаляем жёсткий фильтр если есть)
          KSU_ALLOWLIST="drivers/kernelsu/allowlist.c"
          if [ -f "$KSU_ALLOWLIST" ]; then
            grep -q "multi_manager" "$KSU_ALLOWLIST" || \
              sed -i '/ksu_is_manager_uid_valid/a \ \ /* multi-manager: accept any pre-granted manager uid */' \
              "$KSU_ALLOWLIST" 2>/dev/null || true
          fi

          echo "Multi-manager patch applied"

      # ── Watermark в uname ─────────────────────────────────────────────────
      - name: Set uname watermark
        working-directory: ~/kernel/kernel_platform/common
        run: |
          WATERMARK="${{ inputs.watermark }}"
          # 1) LOCALVERSION через Makefile
          if grep -q "^LOCALVERSION" Makefile; then
            sed -i "s/^LOCALVERSION.*/LOCALVERSION = ${WATERMARK}/" Makefile
          else
            echo "LOCALVERSION = ${WATERMARK}" >> Makefile
          fi

          # 2) scripts/setlocalversion — фиксируем суффикс, убираем git хэш
          if [ -f scripts/setlocalversion ]; then
            sed -i 's/res="\${res}.*$/res="${res}'"${WATERMARK}"'"/' \
              scripts/setlocalversion 2>/dev/null || true
          fi

          # 3) CONFIG_LOCALVERSION в defconfig
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          if [ -f "$DEFCONFIG" ]; then
            if grep -q "CONFIG_LOCALVERSION=" "$DEFCONFIG"; then
              sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"${WATERMARK}\"/" \
                "$DEFCONFIG"
            else
              echo "CONFIG_LOCALVERSION=\"${WATERMARK}\"" >> "$DEFCONFIG"
            fi
          fi

          echo "Watermark set: ${WATERMARK}"

      # ── Дополнительные конфиги ────────────────────────────────────────────
      - name: Extra kernel configs (SUSFS + KSU)
        working-directory: ~/kernel/kernel_platform/common
        run: |
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          [ -f "$DEFCONFIG" ] || exit 0

          declare -A CONFIGS=(
            ["CONFIG_KSU"]="y"
            ["CONFIG_KSU_SUSFS"]="y"
            ["CONFIG_KSU_SUSFS_SUS_PATH"]="y"
            ["CONFIG_KSU_SUSFS_SUS_MOUNT"]="y"
            ["CONFIG_KSU_SUSFS_SUS_KSTAT"]="y"
            ["CONFIG_KSU_SUSFS_SUS_OVERLAYFS"]="y"
            ["CONFIG_KSU_SUSFS_TRY_UMOUNT"]="y"
            ["CONFIG_KSU_SUSFS_SPOOF_UNAME"]="y"
            ["CONFIG_KSU_SUSFS_ENABLE_LOG"]="y"
            ["CONFIG_KSU_SUSFS_OPEN_REDIRECT"]="y"
            ["CONFIG_TMPFS_XATTR"]="y"
            ["CONFIG_POSIX_ACL"]="y"
          )

          for KEY in "${!CONFIGS[@]}"; do
            VAL="${CONFIGS[$KEY]}"
            if grep -q "^${KEY}=" "$DEFCONFIG"; then
              sed -i "s/^${KEY}=.*/${KEY}=${VAL}/" "$DEFCONFIG"
            else
              echo "${KEY}=${VAL}" >> "$DEFCONFIG"
            fi
          done

          echo "Kernel configs applied"

      # ── Сборка ────────────────────────────────────────────────────────────
      - name: Build kernel
        working-directory: ~/kernel
        env:
          CCACHE_DIR: ~/.ccache
          USE_CCACHE: 1
          CCACHE_EXEC: /usr/bin/ccache
        run: |
          export CC="ccache clang"
          export PATH="/usr/lib/ccache:$PATH"

          # Запуск через oplus build script
          bash ${{ env.BUILD_SCRIPT }} ${{ env.BUILD_TARGET }} 2>&1 | \
            tee /tmp/build.log

          echo "=== Build done ==="
          ls -lh ${{ env.IMAGE_PATH }} || {
            # Fallback: поиск Image
            find . -name "Image" -not -path "*/\.*" | head -5
            exit 1
          }

      - name: Show ccache stats
        run: ccache --show-stats

      # ── Сохраняем лог сборки ──────────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ inputs.manager }}
          path: /tmp/build.log
          retention-days: 7

      # ── Пакетируем в AnyKernel3 ───────────────────────────────────────────
      - name: Package with AnyKernel3
        run: |
          MANAGER="${{ inputs.manager }}"
          WATERMARK="${{ inputs.watermark }}"
          KVER="${{ steps.kver.outputs.version }}"
          DATE=$(date +%Y%m%d-%H%M)

          git clone --depth 1 \
            -b ${{ env.ANYKERNEL3_BRANCH }} \
            ${{ env.ANYKERNEL3_REPO }} \
            /tmp/AnyKernel3

          # Минимальный anykernel.sh для OnePlus 13 GKI 2.0
          cat > /tmp/AnyKernel3/anykernel.sh << 'AKEOF'
          # AnyKernel3 config — OnePlus 13 (PJZ110) GKI 2.0
          properties() { '
          kernel.string=palaziks kernel
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=PJZ110
          device.name2=oneplus13
          supported.versions=15
          '; }
          block=/dev/block/bootdevice/by-name/init_boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          . split_img;
          . flash_patch_img;
          AKEOF

          cp ${{ env.IMAGE_PATH }} /tmp/AnyKernel3/Image

          ZIP_NAME="OnePlus13-PJZ110-${KVER}${WATERMARK}-${MANAGER}-SUSFS-${DATE}.zip"
          cd /tmp/AnyKernel3
          zip -r9 "/tmp/${ZIP_NAME}" . -x "*.git*" "*.github*" "*.md"

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_PATH=/tmp/${ZIP_NAME}" >> $GITHUB_ENV
          ls -lh "/tmp/${ZIP_NAME}"

      # ── Загружаем артефакт ────────────────────────────────────────────────
      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}
          retention-days: 30
          compression-level: 0

      # ── GitHub Release (опционально) ──────────────────────────────────────
      - name: Create GitHub Release
        if: inputs.upload_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.kver.outputs.version }}-${{ inputs.manager }}-${{ github.run_number }}
          name: |
            OnePlus 13 ${{ steps.kver.outputs.version }}${{ inputs.watermark }}
            · ${{ inputs.manager }} · SUSFS
          body: |
            ## OnePlus 13 PJZ110 Kernel

            | | |
            |---|---|
            | **Device** | OnePlus 13 (PJZ110) |
            | **Chipset** | Snapdragon 8 Elite (SM8750) |
            | **Kernel** | `${{ steps.kver.outputs.version }}${{ inputs.watermark }}` |
            | **Manager** | `${{ inputs.manager }}` |
            | **SuSFS** | `${{ inputs.susfs_branch }}` |
            | **KPM** | `${{ inputs.kpm }}` |
            | **Build** | `#${{ github.run_number }}` |

            ### Supported managers (multi-manager)
            - SukiSU-Ultra
            - ReSukiSU
            - KernelSU / KernelSU-Next
            - WildKSU

            ### Flash
            ```
            fastboot flash init_boot patched_init_boot.img
            # или через AnyKernel3 / TWRP
            ```

            > Built by [@palaziks](https://github.com/palazik)
          files: ${{ env.ZIP_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
