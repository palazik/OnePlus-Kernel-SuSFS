name: Build OnePlus 13 (PJZ110) Kernel

on:
  workflow_dispatch:
    inputs:
      manager:
        description: 'KSU Manager'
        required: true
        default: 'KernelSU-Next'
        type: choice
        options:
          - SukiSU-Ultra
          - ReSukiSU
          - KernelSU
          - KernelSU-Next
          - WildKSU
      susfs_branch:
        description: 'SuSFS branch'
        required: true
        default: 'gki-android15-6.6'
        type: string
      watermark:
        description: 'uname watermark suffix'
        required: false
        default: '-palaziks'
        type: string

env:
  KERNEL_MANIFEST_REPO: https://github.com/OnePlusOSS/kernel_manifest.git
  KERNEL_MANIFEST_BRANCH: oneplus/sm8750
  KERNEL_MANIFEST_XML: oneplus_13.xml
  BUILD_SCRIPT: kernel_platform/oplus/build/oplus_build_kernel.sh
  BUILD_TARGET: sun perf
  IMAGE_PATH: kernel_platform/out/msm-kernel-sun-perf/dist/Image
  ANYKERNEL3_REPO: https://github.com/osm0sis/AnyKernel3
  ANYKERNEL3_BRANCH: master
  GH_WORKSPACE: ${{ github.workspace }}

jobs:
  build:
    name: Build | ${{ inputs.manager }} | SuSFS v2.1.0
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      # ── 1. Free Disk Space ─────────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' '^mysql-.*' azure-cli google-cloud-sdk google-chrome-stable firefox powershell mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      # ── 2. Dependencies ────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends git python3 python3-pip curl wget zip unzip bc bison flex libssl-dev libelf-dev libncurses-dev build-essential ca-certificates cpio rsync ccache lz4 zstd dos2unix

      # ── 3. Optimize Git & Setup Official Repo ──────────────────────────────
      - name: Optimize Git & Install Repo
        run: |
          git config --global feature.manyFiles true
          git config --global core.fsmonitor true
          git config --global pack.sparse true
          
          sudo curl -s https://storage.googleapis.com/git-repo-downloads/repo -o /usr/local/bin/repo
          sudo chmod +x /usr/local/bin/repo

      # ── 4. Repo Init ───────────────────────────────────────────────────────
      - name: Initialize repo
        run: |
          mkdir -p $GH_WORKSPACE/kernel && cd $GH_WORKSPACE/kernel
          /usr/local/bin/repo init --depth 1 -u ${{ env.KERNEL_MANIFEST_REPO }} -b ${{ env.KERNEL_MANIFEST_BRANCH }} -m ${{ env.KERNEL_MANIFEST_XML }} --repo-rev=v2.16 --no-clone-bundle --no-tags

      # ── 5. Bulletproof Repo Sync ───────────────────────────────────────────
      - name: Sync sources
        working-directory: ${{ env.GH_WORKSPACE }}/kernel
        run: |
          echo "Starting robust sync..."
          success=false
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            if /usr/local/bin/repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --optimized-fetch --fail-fast; then
              success=true
              break
            fi
            echo "⚠️ repo sync attempt $i failed; cleaning corrupted repos and retrying in 15 seconds..."
            find .repo/projects -type d -name "*.git" | while read gitdir; do
              if ! git --git-dir="$gitdir" rev-parse --is-bare-repository >/dev/null 2>&1; then
                echo "Removing corrupted repo: $gitdir"
                rm -rf "$gitdir"
              fi
            done
            sleep 15
          done
          $success || { echo "::error::repo sync failed after 5 attempts"; exit 1; }
          df -h

      # ── 6. Get Kernel Version ──────────────────────────────────────────────
      - name: Get kernel version
        id: kver
        working-directory: ${{ env.GH_WORKSPACE }}/kernel/kernel_platform/common
        run: |
          VER=$(make kernelversion 2>/dev/null || cat Makefile | awk '/^VERSION|^PATCHLEVEL|^SUBLEVEL/{print $3}' | head -3 | paste -sd '.')
          echo "version=${VER}" >> $GITHUB_OUTPUT

      # ── 7. Clone Advanced Patches & Tools ──────────────────────────────────
      - name: Clone Advanced Patches, BBG, and SuSFS
        working-directory: ${{ env.GH_WORKSPACE }}
        run: |
          git clone --depth 1 https://github.com/TheWildJames/kernel_patches.git patches
          git clone --depth 1 https://github.com/vc-teahouse/Baseband-guard.git bbg
          git clone --depth 1 -b master https://gitlab.com/simonpunk/susfs4ksu.git susfs4ksu

      # ── 8. Setup Root Manager ──────────────────────────────────────────────
      - name: Setup Root Manager (${{ inputs.manager }})
        working-directory: ${{ env.GH_WORKSPACE }}/kernel/kernel_platform/common
        run: |
          if [ "${{ inputs.manager }}" == "SukiSU-Ultra" ]; then
            curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s susfs-main
          elif [ "${{ inputs.manager }}" == "ReSukiSU" ]; then
            curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" | bash -s main
          elif [ "${{ inputs.manager }}" == "KernelSU" ]; then
            curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main
          elif [ "${{ inputs.manager }}" == "KernelSU-Next" ]; then
            curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          elif [ "${{ inputs.manager }}" == "WildKSU" ]; then
            curl -LSs "https://raw.githubusercontent.com/WildPlusKernel/KernelSU/main/kernel/setup.sh" | bash -s main
          fi

      # ── 9. Apply Massive Patch Suite & HMBIRD SCX ──────────────────────────
      - name: Apply Optimizations & Patches
        working-directory: ${{ env.GH_WORKSPACE }}/kernel/kernel_platform/common
        run: |
          PATCH_DIR="${{ env.GH_WORKSPACE }}/patches"
          
          echo "Applying General Optimizations..."
          patch -p1 --forward < $PATCH_DIR/common/optimized_mem_operations.patch || true
          patch -p1 --forward < $PATCH_DIR/common/file_struct_8bytes_align.patch || true
          patch -p1 --forward < $PATCH_DIR/common/reduce_cache_pressure.patch || true
          patch -p1 --forward < $PATCH_DIR/common/mem_opt_prefetch.patch || true
          patch -p1 --forward < $PATCH_DIR/common/minimise_wakeup_time.patch || true
          patch -p1 --forward < $PATCH_DIR/common/int_sqrt.patch || true
          patch -p1 --forward < $PATCH_DIR/common/force_tcp_nodelay.patch || true
          patch -p1 --forward < $PATCH_DIR/common/reduce_gc_thread_sleep_time.patch || true
          patch -p1 --forward < $PATCH_DIR/common/f2fs_reduce_congestion.patch || true
          
          echo "Applying HMBIRD SCX (Snapdragon 8 Elite Tweaks)..."
          dos2unix $PATCH_DIR/oneplus/hmbird/overwriter.patch || true
          patch -p1 -F 3 < $PATCH_DIR/oneplus/hmbird/overwriter.patch || true
          dos2unix $PATCH_DIR/oneplus/hmbird/hmbird_config.patch || true
          patch -p1 -F 3 < $PATCH_DIR/oneplus/hmbird/hmbird_config.patch || true
          
          echo "Applying Unicode Fix (Kernel 6.1+)..."
          patch -p1 --forward < $PATCH_DIR/common/unicode_bypass_fix_6.1+.patch || true

      # ── 10. SuSFS v2.1.0 Integration & Manual Hooks ────────────────────────
      - name: Integrate SuSFS v2.1.0 & Manual Hooks
        working-directory: ${{ env.GH_WORKSPACE }}/kernel/kernel_platform/common
        run: |
          SUSFS_DIR="${{ env.GH_WORKSPACE }}/susfs4ksu"
          PATCH_DIR="${{ env.GH_WORKSPACE }}/patches"
          
          cp $SUSFS_DIR/kernel_patches/fs/susfs.c fs/ || true
          cp $SUSFS_DIR/kernel_patches/include/linux/susfs.h include/linux/ || true
          cp $SUSFS_DIR/kernel_patches/include/linux/susfs_def.h include/linux/ 2>/dev/null || true
          cp $SUSFS_DIR/kernel_patches/fs/sus_su.c fs/ 2>/dev/null || true
          cp $SUSFS_DIR/kernel_patches/include/linux/sus_su.h include/linux/ 2>/dev/null || true

          echo "Applying SuSFS core patches..."
          patch -p1 --forward < $SUSFS_DIR/kernel_patches/50_add_susfs_in_${{ inputs.susfs_branch }}.patch || true
          
          echo "Applying Manual Hooks..."
          patch -p1 < $PATCH_DIR/next/scope_min_manual_hooks_v1.4.patch || true

      # ── 11. Configure Advanced Features (BBR, BBG, LTO) ────────────────────
      - name: Configure Advanced Features
        run: |
          DEFCONFIG="${{ env.GH_WORKSPACE }}/kernel/kernel_platform/common/arch/arm64/configs/gki_defconfig"
          
          echo "Enabling BBRv1..."
          cat >> "$DEFCONFIG" <<EOF
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_NET_SCH_FQ_CODEL=y
          EOF
          
          echo "Enabling Baseband Guard (BBG)..."
          cd ${{ env.GH_WORKSPACE }}/kernel/kernel_platform
          bash ${{ env.GH_WORKSPACE }}/bbg/setup.sh main || true
          cd common
          echo "CONFIG_BBG=y" >> "$DEFCONFIG"
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig || true
          patch -p1 --forward < ${{ env.GH_WORKSPACE }}/patches/experimental/bbg/bbg_fix_get_link.patch || true

          echo "Applying Full LTO..."
          scripts/config --file "$DEFCONFIG" -e LTO_CLANG
          scripts/config --file "$DEFCONFIG" -e LTO_CLANG_FULL
          scripts/config --file "$DEFCONFIG" -d LTO_CLANG_NONE
          scripts/config --file "$DEFCONFIG" -d LTO_CLANG_THIN
          
          echo "Enabling TMPFS XATTR (For Mountify)"
          cat >> "$DEFCONFIG" <<EOF
          CONFIG_TMPFS_XATTR=y
          CONFIG_TMPFS_POSIX_ACL=y
          CONFIG_POSIX_ACL=y
          EOF

      # ── 12. Watermark & Final KSU/SuSFS Defconfigs ─────────────────────────
      - name: Inject Defconfigs & Watermark
        working-directory: ${{ env.GH_WORKSPACE }}/kernel/kernel_platform/common
        run: |
          WATERMARK="${{ inputs.watermark }}"
          if grep -q "^LOCALVERSION" Makefile; then
            sed -i "s/^LOCALVERSION.*/LOCALVERSION = ${WATERMARK}/" Makefile
          else
            echo "LOCALVERSION = ${WATERMARK}" >> Makefile
          fi
          if [ -f scripts/setlocalversion ]; then
            sed -i 's/res="\${res}.*$/res="${res}'"${WATERMARK}"'"/' scripts/setlocalversion 2>/dev/null || true
          fi
          
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          declare -A CONFIGS=(
            ["CONFIG_LOCALVERSION"]="\"${WATERMARK}\""
            ["CONFIG_KSU"]="y"
            ["CONFIG_KSU_SUSFS"]="y"
            ["CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT"]="y"
            ["CONFIG_KSU_SUSFS_SUS_PATH"]="y"
            ["CONFIG_KSU_SUSFS_SUS_MOUNT"]="y"
            ["CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT"]="y"
            ["CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT"]="y"
            ["CONFIG_KSU_SUSFS_SUS_KSTAT"]="y"
            ["CONFIG_KSU_SUSFS_SUS_OVERLAYFS"]="n"
            ["CONFIG_KSU_SUSFS_TRY_UMOUNT"]="y"
            ["CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT"]="y"
            ["CONFIG_KSU_SUSFS_SPOOF_UNAME"]="y"
            ["CONFIG_KSU_SUSFS_ENABLE_LOG"]="y"
            ["CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS"]="y"
            ["CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG"]="y"
            ["CONFIG_KSU_SUSFS_OPEN_REDIRECT"]="y"
            ["CONFIG_KSU_SUSFS_SUS_MAP"]="y"
            ["CONFIG_KSU_SUSFS_SUS_SU"]="n"
          )
          for KEY in "${!CONFIGS[@]}"; do
            VAL="${CONFIGS[$KEY]}"
            if grep -q "^${KEY}=" "$DEFCONFIG"; then
              sed -i "s/^${KEY}=.*/${KEY}=${VAL}/" "$DEFCONFIG"
            else
              echo "${KEY}=${VAL}" >> "$DEFCONFIG"
            fi
          done

      # ── 13. Build Kernel ───────────────────────────────────────────────────
      - name: Build kernel
        working-directory: ${{ env.GH_WORKSPACE }}/kernel
        run: |
          export PATH="/usr/lib/ccache:$PATH"
          bash ${{ env.BUILD_SCRIPT }} ${{ env.BUILD_TARGET }} 2>&1 | tee /tmp/build.log
          ls -lh ${{ env.IMAGE_PATH }} || exit 1

      # ── 14. Package & Upload ───────────────────────────────────────────────
      - name: Package with AnyKernel3
        run: |
          git clone --depth 1 -b ${{ env.ANYKERNEL3_BRANCH }} ${{ env.ANYKERNEL3_REPO }} /tmp/AnyKernel3
          cat > /tmp/AnyKernel3/anykernel.sh << 'AKEOF'
          properties() { '
          kernel.string=palaziks godmode kernel
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=PJZ110
          device.name2=oneplus13
          supported.versions=15
          '; }
          block=/dev/block/bootdevice/by-name/init_boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          . split_img;
          . flash_patch_img;
          AKEOF
          
          cp ${{ env.GH_WORKSPACE }}/kernel/${{ env.IMAGE_PATH }} /tmp/AnyKernel3/Image
          ZIP_NAME="OP13-PJZ110-${{ steps.kver.outputs.version }}${{ inputs.watermark }}-${{ inputs.manager }}-SUSFSv2.1.0.zip"
          cd /tmp/AnyKernel3
          zip -r9 "/tmp/${ZIP_NAME}" . -x "*.git*" "*.github*" "*.md"
          echo "ZIP_PATH=/tmp/${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV

      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}

      - name: Create GitHub Release
        if: inputs.upload_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.kver.outputs.version }}-${{ inputs.manager }}-GodMode
          name: OnePlus 13 (PJZ110) | ${{ inputs.manager }} | SuSFS v2.1.0
          body: |
            ### 🚀 God-Tier Build Features:
            - **Root:** `${{ inputs.manager }}`
            - **SuSFS:** `v2.1.0` (Full Stealth + Manual Hooks)
            - **Performance:** HMBIRD SCX, LTO (Full), BBRv1, Cache Optimizations
            - **Security:** Baseband Guard (BBG), Unicode Bypass Fix
            - **FS:** TMPFS XATTR/ACL (Mountify Support)
          files: ${{ env.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
