name: Build OnePlus 13 (PJZ110) Kernel

on:
  workflow_dispatch:
    inputs:
      manager:
        description: 'KSU Manager'
        required: true
        default: 'SukiSU-Ultra'
        type: choice
        options:
          - SukiSU-Ultra
          - ReSukiSU
          - KernelSU
          - KernelSU-Next
          - WildKSU
      susfs_branch:
        description: 'SuSFS branch'
        required: true
        default: 'gki-android15-6.6'
        type: string
      kpm:
        description: 'Enable KPM support (SukiSU-Ultra only)'
        required: true
        default: true
        type: boolean
      watermark:
        description: 'uname watermark suffix'
        required: false
        default: '-palaziks'
        type: string
      upload_release:
        description: 'Create GitHub Release'
        required: false
        default: false
        type: boolean

env:
  KERNEL_MANIFEST_REPO: https://github.com/OnePlusOSS/kernel_manifest.git
  KERNEL_MANIFEST_BRANCH: oneplus/sm8750
  KERNEL_MANIFEST_XML: oneplus_13.xml
  BUILD_SCRIPT: kernel_platform/oplus/build/oplus_build_kernel.sh
  BUILD_TARGET: sun perf
  IMAGE_PATH: kernel_platform/out/msm-kernel-sun-perf/dist/Image
  ANYKERNEL3_REPO: https://github.com/osm0sis/AnyKernel3
  ANYKERNEL3_BRANCH: master

jobs:
  build:
    name: Build | ${{ inputs.manager }} | SuSFS=${{ inputs.susfs_branch }}
    runs-on: ubuntu-22.04
    timeout-minutes: 240

    steps:
      # ── Free Disk Space ───────────────────────────────────────────────────
      - name: Free disk space
        run: |
          sudo apt-get remove -y '^dotnet-.*' '^llvm-.*' 'php.*' '^mongodb-.*' \
            '^mysql-.*' azure-cli google-cloud-sdk google-chrome-stable \
            firefox powershell mono-devel 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      # ── Dependencies ──────────────────────────────────────────────────────
      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            git repo python3 python3-pip curl wget zip unzip bc \
            bison flex libssl-dev libelf-dev libncurses-dev \
            build-essential ca-certificates cpio rsync \
            ccache lz4 zstd dos2unix

      # ── Setup ccache ──────────────────────────────────────────────────────
      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-op13-${{ inputs.manager }}-${{ github.run_id }}
          restore-keys: |
            ccache-op13-${{ inputs.manager }}-
            ccache-op13-

      - name: Configure ccache
        run: |
          ccache --max-size=5G
          ccache --zero-stats

      # ── Repo Init & Robust Sync ───────────────────────────────────────────
      - name: Initialize repo
        run: |
          mkdir -p /home/runner/kernel && cd /home/runner/kernel
          repo init --depth 1 \
            -u ${{ env.KERNEL_MANIFEST_REPO }} \
            -b ${{ env.KERNEL_MANIFEST_BRANCH }} \
            -m ${{ env.KERNEL_MANIFEST_XML }}

      - name: Sync sources
        working-directory: /home/runner/kernel
        run: |
          echo "Starting robust sync..."
          success=false
          for i in 1 2 3; do
            if repo sync -c -j2 --no-clone-bundle --no-tags --optimized-fetch --fail-fast; then
              success=true
              break
            fi
            echo "⚠️ repo sync attempt $i failed; retrying in 10 seconds..."
            sleep 10
          done
          $success || { echo "::error::repo sync failed after 3 attempts"; exit 1; }
          echo "Sync complete"
          df -h

      # ── Kernel Version ────────────────────────────────────────────────────
      - name: Get kernel version
        id: kver
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          VER=$(make kernelversion 2>/dev/null || cat Makefile | \
            awk '/^VERSION|^PATCHLEVEL|^SUBLEVEL/{print $3}' | \
            head -3 | paste -sd '.')
          echo "version=${VER}" >> $GITHUB_OUTPUT
          echo "Kernel version: ${VER}"

      # ── Clone Advanced Patches ────────────────────────────────────────────
      - name: Clone Kernel Patches & BBG
        run: |
          git clone --depth 1 https://github.com/TheWildJames/kernel_patches.git /tmp/kernel_patches
          git clone --depth 1 https://github.com/vc-teahouse/Baseband-guard.git /tmp/Baseband-guard

      # ── Setup KSU Manager ─────────────────────────────────────────────────
      - name: Setup KSU — SukiSU-Ultra
        if: inputs.manager == 'SukiSU-Ultra'
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" \
            | bash -s susfs-main

      - name: Setup KSU — ReSukiSU
        if: inputs.manager == 'ReSukiSU'
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          curl -LSs "https://raw.githubusercontent.com/rsuntk/KernelSU/main/kernel/setup.sh" \
            | bash -s main

      - name: Setup KSU — KernelSU
        if: inputs.manager == 'KernelSU'
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" \
            | bash -s main

      - name: Setup KSU — KernelSU-Next
        if: inputs.manager == 'KernelSU-Next'
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" \
            | bash -s next

      - name: Setup KSU — WildKSU
        if: inputs.manager == 'WildKSU'
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          curl -LSs "https://raw.githubusercontent.com/WildPlusKernel/KernelSU/main/kernel/setup.sh" \
            | bash -s main

      # ── Apply Massive Patch Suite & Optimizations ─────────────────────────
      - name: Apply Optimizations & Patches
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          echo "Applying General Optimizations..."
          patch -p1 --forward < /tmp/kernel_patches/common/optimized_mem_operations.patch || true
          patch -p1 --forward < /tmp/kernel_patches/common/file_struct_8bytes_align.patch || true
          patch -p1 --forward < /tmp/kernel_patches/common/reduce_cache_pressure.patch || true
          patch -p1 --forward < /tmp/kernel_patches/common/mem_opt_prefetch.patch || true
          patch -p1 --forward < /tmp/kernel_patches/common/minimise_wakeup_time.patch || true
          patch -p1 --forward < /tmp/kernel_patches/common/int_sqrt.patch || true
          patch -p1 --forward < /tmp/kernel_patches/common/force_tcp_nodelay.patch || true
          patch -p1 --forward < /tmp/kernel_patches/common/reduce_gc_thread_sleep_time.patch || true
          patch -p1 --forward < /tmp/kernel_patches/common/f2fs_reduce_congestion.patch || true
          
          echo "Applying HMBIRD SCX (Snapdragon 8 Elite Tweaks)..."
          dos2unix /tmp/kernel_patches/oneplus/hmbird/overwriter.patch || true
          patch -p1 -F 3 < /tmp/kernel_patches/oneplus/hmbird/overwriter.patch || true
          dos2unix /tmp/kernel_patches/oneplus/hmbird/hmbird_config.patch || true
          patch -p1 -F 3 < /tmp/kernel_patches/oneplus/hmbird/hmbird_config.patch || true
          
          echo "Applying Unicode Fix (Kernel 6.1+)..."
          patch -p1 --forward < /tmp/kernel_patches/common/unicode_bypass_fix_6.1+.patch || true

      # ── SuSFS Integration ─────────────────────────────────────────────────
      - name: Integrate SuSFS
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          SUSFS_BRANCH="${{ inputs.susfs_branch }}"
          git clone --depth 1 -b "${SUSFS_BRANCH}" https://gitlab.com/simonpunk/susfs4ksu.git /tmp/susfs4ksu || true

          cp /tmp/susfs4ksu/kernel_patches/fs/susfs.c               fs/ || true
          cp /tmp/susfs4ksu/kernel_patches/include/linux/susfs.h    include/linux/ || true
          cp /tmp/susfs4ksu/kernel_patches/include/linux/susfs_def.h include/linux/ 2>/dev/null || true
          cp /tmp/susfs4ksu/kernel_patches/fs/sus_su.c              fs/ 2>/dev/null || true
          cp /tmp/susfs4ksu/kernel_patches/include/linux/sus_su.h   include/linux/ 2>/dev/null || true

          PATCH_DIR=/tmp/susfs4ksu/kernel_patches
          if ls "${PATCH_DIR}"/*.patch &>/dev/null; then
            for p in "${PATCH_DIR}"/*.patch; do
              patch -p1 --forward --reject-file=/dev/null < "$p" || echo "Patch $p skipped"
            done
          fi
          
          echo "SuSFS integrated (branch: ${SUSFS_BRANCH})"

      # ── Manual KSU Hooks ──────────────────────────────────────────────────
      - name: Apply Manual KSU Hooks
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          echo "Applying Manual Hooks..."
          patch -p1 < /tmp/kernel_patches/next/scope_min_manual_hooks_v1.4.patch || true

      # ── Configure Advanced Features (BBR, BBG, LTO) ───────────────────────
      - name: Configure Advanced Features
        run: |
          DEFCONFIG="/home/runner/kernel/kernel_platform/common/arch/arm64/configs/gki_defconfig"
          
          echo "Enabling BBRv1..."
          cat >> "$DEFCONFIG" <<EOF
          CONFIG_TCP_CONG_ADVANCED=y
          CONFIG_TCP_CONG_BBR=y
          CONFIG_NET_SCH_FQ=y
          CONFIG_NET_SCH_FQ_CODEL=y
          EOF
          
          echo "Enabling Baseband Guard (BBG)..."
          cd /home/runner/kernel/kernel_platform
          bash /tmp/Baseband-guard/setup.sh main || true
          cd common
          echo "CONFIG_BBG=y" >> "$DEFCONFIG"
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/selinux/selinux,baseband_guard/ } }' security/Kconfig || true
          patch -p1 --forward < /tmp/kernel_patches/experimental/bbg/bbg_fix_get_link.patch || true

          echo "Applying LTO (Full Link Time Optimization)..."
          echo "CONFIG_LTO_CLANG=y" >> "$DEFCONFIG"
          echo "CONFIG_LTO_CLANG_FULL=y" >> "$DEFCONFIG"

      # ── KPM Config ────────────────────────────────────────────────────────
      - name: Enable KPM config
        if: inputs.kpm == true && inputs.manager == 'SukiSU-Ultra'
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          DEFCONFIGS=("arch/arm64/configs/gki_defconfig" "arch/arm64/configs/vendor/sun_GKI.config")
          for DEF in "${DEFCONFIGS[@]}"; do
            if [ -f "$DEF" ]; then
              grep -q "CONFIG_KPM" "$DEF" || echo "CONFIG_KPM=y" >> "$DEF"
              grep -q "CONFIG_KALLSYMS_ALL" "$DEF" || echo "CONFIG_KALLSYMS_ALL=y" >> "$DEF"
            fi
          done

      # ── Multi-Manager Patch ───────────────────────────────────────────────
      - name: Patch multi-manager support
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          KSUD_SYSCTL="drivers/kernelsu/core_hook.c"
          if [ -f "$KSUD_SYSCTL" ]; then
            sed -i 's/strcmp(task_comm, "com.rsuntk.ksu")/1 \/\* multi-manager \*\//g' "$KSUD_SYSCTL" 2>/dev/null || true
          fi
          KSU_ALLOWLIST="drivers/kernelsu/allowlist.c"
          if [ -f "$KSU_ALLOWLIST" ]; then
            grep -q "multi_manager" "$KSU_ALLOWLIST" || \
              sed -i '/ksu_is_manager_uid_valid/a \ \ /* multi-manager: accept any pre-granted manager uid */' "$KSU_ALLOWLIST" 2>/dev/null || true
          fi

      # ── Set Uname Watermark ───────────────────────────────────────────────
      - name: Set uname watermark
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          WATERMARK="${{ inputs.watermark }}"
          if grep -q "^LOCALVERSION" Makefile; then
            sed -i "s/^LOCALVERSION.*/LOCALVERSION = ${WATERMARK}/" Makefile
          else
            echo "LOCALVERSION = ${WATERMARK}" >> Makefile
          fi
          if [ -f scripts/setlocalversion ]; then
            sed -i 's/res="\${res}.*$/res="${res}'"${WATERMARK}"'"/' scripts/setlocalversion 2>/dev/null || true
          fi
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          if grep -q "CONFIG_LOCALVERSION=" "$DEFCONFIG"; then
            sed -i "s/CONFIG_LOCALVERSION=.*/CONFIG_LOCALVERSION=\"${WATERMARK}\"/" "$DEFCONFIG"
          else
            echo "CONFIG_LOCALVERSION=\"${WATERMARK}\"" >> "$DEFCONFIG"
          fi

      # ── Extra Kernel Configs ──────────────────────────────────────────────
      - name: Extra kernel configs (SUSFS + KSU)
        working-directory: /home/runner/kernel/kernel_platform/common
        run: |
          DEFCONFIG="arch/arm64/configs/gki_defconfig"
          declare -A CONFIGS=(
            ["CONFIG_KSU"]="y"
            ["CONFIG_KSU_SUSFS"]="y"
            ["CONFIG_KSU_SUSFS_SUS_PATH"]="y"
            ["CONFIG_KSU_SUSFS_SUS_MOUNT"]="y"
            ["CONFIG_KSU_SUSFS_SUS_KSTAT"]="y"
            ["CONFIG_KSU_SUSFS_SUS_OVERLAYFS"]="y"
            ["CONFIG_KSU_SUSFS_TRY_UMOUNT"]="y"
            ["CONFIG_KSU_SUSFS_SPOOF_UNAME"]="y"
            ["CONFIG_KSU_SUSFS_ENABLE_LOG"]="y"
            ["CONFIG_KSU_SUSFS_OPEN_REDIRECT"]="y"
            ["CONFIG_TMPFS_XATTR"]="y"
            ["CONFIG_TMPFS_POSIX_ACL"]="y"
            ["CONFIG_POSIX_ACL"]="y"
          )
          for KEY in "${!CONFIGS[@]}"; do
            VAL="${CONFIGS[$KEY]}"
            if grep -q "^${KEY}=" "$DEFCONFIG"; then
              sed -i "s/^${KEY}=.*/${KEY}=${VAL}/" "$DEFCONFIG"
            else
              echo "${KEY}=${VAL}" >> "$DEFCONFIG"
            fi
          done

      # ── Build Kernel ──────────────────────────────────────────────────────
      - name: Build kernel
        working-directory: /home/runner/kernel
        env:
          CCACHE_DIR: ~/.ccache
          USE_CCACHE: 1
          CCACHE_EXEC: /usr/bin/ccache
        run: |
          export CC="ccache clang"
          export PATH="/usr/lib/ccache:$PATH"

          bash ${{ env.BUILD_SCRIPT }} ${{ env.BUILD_TARGET }} 2>&1 | tee /tmp/build.log

          echo "=== Build done ==="
          ls -lh ${{ env.IMAGE_PATH }} || {
            find . -name "Image" -not -path "*/\.*" | head -5
            exit 1
          }

      - name: Show ccache stats
        run: ccache --show-stats

      # ── Upload Build Log ──────────────────────────────────────────────────
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ inputs.manager }}
          path: /tmp/build.log
          retention-days: 7

      # ── Package with AnyKernel3 ───────────────────────────────────────────
      - name: Package with AnyKernel3
        run: |
          MANAGER="${{ inputs.manager }}"
          WATERMARK="${{ inputs.watermark }}"
          KVER="${{ steps.kver.outputs.version }}"
          DATE=$(date +%Y%m%d-%H%M)

          git clone --depth 1 -b ${{ env.ANYKERNEL3_BRANCH }} ${{ env.ANYKERNEL3_REPO }} /tmp/AnyKernel3

          cat > /tmp/AnyKernel3/anykernel.sh << 'AKEOF'
          # AnyKernel3 config — OnePlus 13 (PJZ110) GKI 2.0
          properties() { '
          kernel.string=palaziks kernel
          do.devicecheck=0
          do.modules=0
          do.systemless=1
          do.cleanup=1
          do.cleanuponabort=0
          device.name1=PJZ110
          device.name2=oneplus13
          supported.versions=15
          '; }
          block=/dev/block/bootdevice/by-name/init_boot;
          is_slot_device=1;
          ramdisk_compression=auto;
          patch_vbmeta_flag=auto;
          . tools/ak3-core.sh;
          . split_img;
          . flash_patch_img;
          AKEOF

          cp /home/runner/kernel/${{ env.IMAGE_PATH }} /tmp/AnyKernel3/Image

          ZIP_NAME="OnePlus13-PJZ110-${KVER}${WATERMARK}-${MANAGER}-SUSFS-${DATE}.zip"
          cd /tmp/AnyKernel3
          zip -r9 "/tmp/${ZIP_NAME}" . -x "*.git*" "*.github*" "*.md"

          echo "ZIP_NAME=${ZIP_NAME}" >> $GITHUB_ENV
          echo "ZIP_PATH=/tmp/${ZIP_NAME}" >> $GITHUB_ENV

      # ── Upload Artifact ───────────────────────────────────────────────────
      - name: Upload kernel zip
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_PATH }}
          retention-days: 30
          compression-level: 0

      # ── GitHub Release ────────────────────────────────────────────────────
      - name: Create GitHub Release
        if: inputs.upload_release == true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.kver.outputs.version }}-${{ inputs.manager }}-${{ github.run_number }}
          name: |
            OnePlus 13 ${{ steps.kver.outputs.version }}${{ inputs.watermark }}
            · ${{ inputs.manager }} · SUSFS
          body: |
            ## OnePlus 13 PJZ110 Kernel

            | | |
            |---|---|
            | **Device** | OnePlus 13 (PJZ110) |
            | **Chipset** | Snapdragon 8 Elite (SM8750) |
            | **Kernel** | `${{ steps.kver.outputs.version }}${{ inputs.watermark }}` |
            | **Manager** | `${{ inputs.manager }}` |
            | **SuSFS** | `${{ inputs.susfs_branch }}` |
            | **KPM** | `${{ inputs.kpm }}` |
            | **Build** | `#${{ github.run_number }}` |

            ### 🚀 Integrated Features
            *   **Massive Optimization Suite** (Memory, I/O, Cache)
            *   **HMBIRD SCX** (Snapdragon 8 Elite Tweaks)
            *   **LTO** (Full Link Time Optimization)
            *   **BBRv1** (Advanced TCP Congestion Control)
            *   **Baseband Guard (BBG)** (LSM Baseband Security)
            *   **Manual KSU Hooks** (Better Stealth)
            *   **Unicode Bypass Fix**

            ### 📱 Supported Managers (Multi-manager)
            - SukiSU-Ultra
            - ReSukiSU
            - KernelSU / KernelSU-Next
            - WildKSU

            ### Flash
            ```bash
            fastboot flash init_boot patched_init_boot.img
            # or flash via AnyKernel3 / TWRP / KernelFlasher
            ```
            > Built by [@palaziks](https://github.com/palazik)
          files: ${{ env.ZIP_PATH }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
